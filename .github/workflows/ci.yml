# CI for the Rust port. Mirrors the rust-template shape, adapted for a crate that
# Rust workspace at the repo root (promoted from rust/ after the port).
# (not ported). Promote to the repo-root `.github/workflows/` with a
name: rust-ci

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always


jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # tags for the git-describe version stamp (build.rs)

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Check formatting
        run: cargo fmt --all --check

      # Default features only: the native / local-ML features (discord-voice
      # Opus, local-embed / local-turn ONNX runtime, audio-resample libopus)
      # need system libraries provisioned in a dedicated matrix job — added when
      # subsystems 09/04 land. Their crate VERSIONS are still resolved here.
      - name: Lint with clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Security audit
        run: cargo audit || true # advisory-only for now
