# Default familiar profile — checked into the repo.
#
# Sole source of truth for configuration defaults. When another
# familiar's `character.toml` omits a field, the loader falls back
# to the value here.
#
# New familiars should copy this file as a starting template:
#
#     cp -r data/familiars/_default data/familiars/my-familiar
#     # then edit data/familiars/my-familiar/character.toml
#
# The leading underscore in the folder name is a convention: it marks
# the directory as a reference, not a runnable familiar. Do not set
# FAMILIAR_ID=_default.

display_tz = "UTC"
aliases    = []

[providers.history]
window_size = 20

# --- Turn detection strategy -----------------------------------------------
#
# strategy: "deepgram" (default) uses Deepgram's hosted endpointer.
#           "ten+smart_turn" activates the local TEN-VAD + Smart Turn v3
#           chain — saves ~150-200 ms of endpointing latency.
#           Requires the ``local-turn`` extra and a Smart Turn ONNX file
#           under data/models/smart-turn-v3.onnx.
#           See docs/architecture/tuning.md § local-turn-detection-v1.

[providers.turn_detection]
strategy = "deepgram"   # "deepgram" | "ten+smart_turn"

# --- Text-to-speech --------------------------------------------------------
#
# provider: "azure" (default), "cartesia", or "gemini"
#
# Azure:    set AZURE_SPEECH_KEY + AZURE_SPEECH_REGION env vars.
# Cartesia: set CARTESIA_API_KEY env var.
# Gemini:   set GOOGLE_API_KEY env var.

[tts]
provider          = "azure"
azure_voice       = "en-US-AmberNeural"
cartesia_voice_id = "999df508-4de5-40a7-8bd3-8c12f678c284"
cartesia_model    = "sonic-3"
gemini_voice      = "Kore"
gemini_model      = "gemini-3.1-flash-tts-preview"
greetings         = []

# --- LLM slots -------------------------------------------------------------
#
# provider_order pins OpenRouter routing for prompt-cache stability.
# STOPGAP — drop this once OpenRouter's default routing reliably hits
# a cache-supporting provider, or when you swap to a different model.
# See docs/architecture/tuning.md § provider pinning.

[llm.main_prose]
model          = "z-ai/glm-5.1"
temperature    = 0.7
provider_order = ["z-ai"]            # first-party — best caching for GLM
