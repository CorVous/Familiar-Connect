# Default familiar profile — checked into the repo.
#
# Sole source of truth for configuration defaults. When another
# familiar's `character.toml` omits a field, the loader falls back
# to the value here.
#
# New familiars should copy this directory as a starting template:
#
#     cp -r data/familiars/_default data/familiars/my-familiar
#     # then edit my-familiar/character.toml (config) and
#     # my-familiar/character.md (persona + operational essentials).
#
# The leading underscore in the folder name is a convention: it marks
# the directory as a reference, not a runnable familiar. Do not set
# FAMILIAR_ID=_default.

# IANA zone name (e.g. "America/Los_Angeles"); sets the timezone the
# familiar's clock renders in. Invalid names fail at startup.
display_tz = "UTC"
aliases    = []

# Sleep schedule — wall-clock window in display_tz, drives the reserved
# "sleep" activity (catalog entry in activities.toml). Omit the [sleep]
# table to leave the schedule disarmed. window may wrap midnight;
# grace_minutes (default 30) is the delay after window start before
# force-sleep. Wake is fixed at the window's end.
# [sleep]
# window        = "00:00-08:00"
# grace_minutes = 30

[providers.history]
# Hard upper bounds on history turns per tier — safety nets behind
# the token-aware budget below. Lower these only to force a tighter
# absolute cap on prompt size; the recent-history token cap usually
# bites first.
voice_window_size = 100
text_window_size  = 200

# Voice transcription emits one user turn per Deepgram segment-final,
# so a long monologue lands as several consecutive same-speaker rows.
# At prompt-render time, fragments from the same speaker within this
# many seconds collapse into one message (earliest timestamp,
# space-joined content). 0 disables. Discord text turns are unaffected
# (they carry platform_message_id and never coalesce).
coalesce_max_gap_seconds = 45.0

# --- Prompt assembly budget ------------------------------------------------
#
# Per-tier token caps for the prompt assembler. Each cap is a hard
# number — no proportional / "auto" derivation, and there is NO
# separate combined cap. Every section self-truncates to its own cap
# while the prompt is built; the assembled prompt is simply bounded by
# the sum of these caps. Override one knob in a per-familiar
# character.toml and the rest stay put (TOML deep-merge).
#
# (There is no `total_tokens` knob. The whole-prompt total is a
# derived figure — the sum of the per-section caps below — exposed in
# code as `TierBudget.total_tokens` for reporting only. Nothing trims
# against it.)
#
# recent_history_tokens cap on the recent-history block while building.
# rag_tokens            cap on the RAG-context block.
# dossier_tokens        cap on people-dossier block.
# summary_tokens        cap on the conversation-summary block.
# reflection_tokens     cap on reflections block (M3).
# lorebook_tokens       cap on lorebook block (M4).
# max_history_turns     hard upper bound on history turn count
#                       (safety net behind recent_history_tokens).
# max_rag_turns         hard cap on RAG turn results.
# max_rag_facts         hard cap on RAG fact results.
# max_dossier_people    hard cap on dossier rows.
# max_reflections       hard cap on rendered reflection rows (M3).
# max_lorebook_entries  hard cap on rendered lorebook entries (M4).
#
# Defaults give breathing room while staying comfortably inside model
# context windows (Haiku 200 k voice, GLM-5.2 1 M text/background):
# derived totals land around ~6.5 k voice, ~18 k text, ~52 k background.
# Voice stays the tightest of the three to protect first-token latency.

[budget.voice]
recent_history_tokens = 3000
rag_tokens            = 900
dossier_tokens        = 900
summary_tokens        = 600
reflection_tokens     = 600
lorebook_tokens       = 600
max_history_turns     = 200
max_rag_turns         = 10
max_rag_facts         = 6
max_dossier_people    = 16
max_reflections       = 6
max_lorebook_entries  = 12

[budget.text]
recent_history_tokens = 8000
rag_tokens            = 2400
dossier_tokens        = 2400
summary_tokens        = 1600
reflection_tokens     = 1600
lorebook_tokens       = 1600
max_history_turns     = 400
max_rag_turns         = 16
max_rag_facts         = 10
max_dossier_people    = 24
max_reflections       = 10
max_lorebook_entries  = 20

[budget.background]
recent_history_tokens = 24000
rag_tokens            = 8000
dossier_tokens        = 8000
summary_tokens        = 4000
reflection_tokens     = 4000
lorebook_tokens       = 4000
max_history_turns     = 1000
max_rag_turns         = 24
max_rag_facts         = 16
max_dossier_people    = 32
max_reflections       = 16
max_lorebook_entries  = 32

# --- Retrieval ranking -----------------------------------------------------
#
# Weights blended into RagContextLayer's fact ranking. All four signals
# are normalised to [0, 1] within the candidate batch before weighting;
# the top ``max_rag_facts`` are kept.
#
# bm25_weight        — quality of the FTS5 BM25 match. Default 1.0.
# recency_weight     — newest facts in the candidate batch ranked higher.
# importance_weight  — extractor's 1-10 hint (``importance/10``). Legacy
#                      / unscored facts get the neutral midpoint.
# embedding_weight   — cosine similarity to cue embedding (M6). Needs an
#                      embedder configured below; without one, the layer
#                      logs once and falls back to BM25-only.
#
# Default reproduces pre-M2 ordering (BM25 only) plus M2's importance
# bias. Raise embedding_weight (along with [providers.embedding]) once
# the fact_embedding projector has populated the side-index.

[memory.retrieval]
bm25_weight       = 1.0
recency_weight    = 0.0
importance_weight = 0.6
embedding_weight  = 0.0

# --- Memory projectors (M5) -----------------------------------------------
#
# Watermark-driven writers that project ``turns`` into side-indices.
# Each name maps to a registered factory in
# ``familiar_connect.processors.projectors``. Default keeps every
# shipped projector — drop one to disable it, add a third-party
# projector by registering it at import time and listing the name.
#
# rolling_summary  per-channel + cross-channel rolling summaries.
# rich_note        fact extractor (the "rich-note" projector).
# people_dossier   per-person summary off the facts watermark.
# reflection       higher-order syntheses with citation provenance.
# fact_supersede   retires prior facts replaced by newer ones.
# fact_embedding   M6 — vectors for semantic recall. Opt-in: requires
#                  [providers.embedding].backend != "off".

[providers.memory]
projectors = [
    "rolling_summary",
    "rich_note",
    "people_dossier",
    "reflection",
    "fact_supersede",
]

# Per-projector worker tuning. Cadences trade memory freshness
# against LLM spend — every tick that finds work costs background
# LLM calls. Knobs accepted whether or not the projector is listed
# above, so toggling a projector keeps its tuning.

[providers.memory.rolling_summary]
turns_threshold = 10    # new turns per channel before summary refreshes
tick_interval_s = 5.0

[providers.memory.rich_note]
batch_size       = 10   # turns per extraction batch (also the trigger threshold)
tick_interval_s  = 15.0
participants_max = 30   # cap on participant manifest rows in the prompt

[providers.memory.people_dossier]
tick_interval_s = 20.0

[providers.memory.reflection]
turns_threshold          = 20   # new turns before a reflection pass
max_reflections_per_tick = 3
max_turns_per_tick       = 50   # window cap on turns fed to the prompt
recent_facts_limit       = 20   # recent facts included in the prompt
tick_interval_s          = 60.0

[providers.memory.fact_supersede]
batch_size      = 5     # new facts evaluated per tick (one LLM call each)
tick_interval_s = 60.0
priors_max      = 20    # prior facts shown to the LLM per subject

# --- Embeddings (M6) -------------------------------------------------------
#
# Backend for the ``fact_embedding`` projector and the embedding signal
# in [memory.retrieval].
#
# backend = "off"        No-op (default). RAG layer skips the embedding
#                        signal even when embedding_weight > 0.
# backend = "hash"       Deterministic locality-hashing baseline. No
#                        deps; weak signal, but useful for sanity
#                        checks / smoke tests.
# backend = "fastembed"  ONNX-backed sentence embedder (Qdrant
#                        FastEmbed). Real semantic similarity. Needs
#                        the ``local-embed`` extra; install via
#                        ``uv sync --extra local-embed``. Default model
#                        BGE-small downloads ~130 MB on first use,
#                        cached under ~/.cache/fastembed.
#
# To turn on semantic recall:
#   1. switch ``backend`` here (and install ``local-embed`` for fastembed)
#   2. add ``"fact_embedding"`` to [providers.memory].projectors
#   3. raise [memory.retrieval].embedding_weight above 0
#
# ``dim`` is the vector size for backends that accept one (``hash``).
# Real backends with a fixed model dim ignore this knob.
#
# ``fastembed_model`` selects the FastEmbed model. Known good options:
#   BAAI/bge-small-en-v1.5     (default; 384 dim, ~130 MB)
#   BAAI/bge-base-en-v1.5      (768 dim, ~440 MB; better quality)
#   sentence-transformers/all-MiniLM-L6-v2  (384 dim, lighter)
#
# A model swap accumulates new vectors beside the old (storage keys on
# the embedder's ``name``, which carries the model name) — no audit
# history destroyed. Wipe ``fact_embeddings`` to force a re-embed.

[providers.embedding]
backend          = "off"
dim              = 256
fastembed_model  = "BAAI/bge-small-en-v1.5"

# --- Turn detection --------------------------------------------------------
#
# strategy = "deepgram"        Deepgram's hosted endpointer. Default.
# strategy = "ten+smart_turn"  Local TEN-VAD + Smart Turn v3 chain. Saves
#                              ~150-200 ms of endpointing latency, and is
#                              required when [providers.stt].backend is a
#                              local backend (parakeet, faster_whisper) —
#                              those have no internal endpointer.
#                              Needs the ``local-turn`` extra + the Smart
#                              Turn ONNX (default path is below).

[providers.turn_detection]
strategy = "deepgram"   # "deepgram" | "ten+smart_turn"

[providers.turn_detection.local]
# Knobs for the TEN-VAD + Smart Turn chain. Read only when strategy =
# "ten+smart_turn". Defaults are field-tested; rarely need tweaking.
#
# Smart Turn weights are pulled from HuggingFace on first use (cached
# under ~/.cache/huggingface). The default is the CPU ONNX export,
# which matches the ``onnxruntime`` shipped by the local-turn extra.
# If you've installed ``onnxruntime-gpu`` separately, switch
# smart_turn_filename to ``smart-turn-v3.2-gpu.onnx``.
smart_turn_repo_id    = "pipecat-ai/smart-turn-v3"
smart_turn_filename   = "smart-turn-v3.2-cpu.onnx"
silence_ms            = 200    # silence after speech before SmartTurn fires
speech_start_ms       = 100    # consecutive speech before "speaking" latches
vad_threshold         = 0.5    # TEN-VAD activation threshold
smart_turn_threshold  = 0.5    # SmartTurn completion-probability cut
vad_hop_size          = 256    # samples per VAD frame; 256 = 16 ms at 16 kHz

# --- Speech-to-text --------------------------------------------------------
#
# Pick by what you care about:
#                          Deepgram     Parakeet (NeMo)    FasterWhisper (CT2)
# location                 cloud        local              local
# cost                     paid         free               free
# latency to final         lowest       moderate           moderate (CPU int8)
# install size             tiny         heavy (torch+CUDA) light (no torch)
# accuracy (English)       high         highest local      strong local
# secret                   API key      —                  —
# pairing requirement      —            ten+smart_turn     ten+smart_turn
#
# Default: deepgram. Switch backend by changing the ``backend`` field
# below; each backend reads its own ``[providers.stt.<backend>]`` table.

[providers.stt]
backend = "deepgram"            # "deepgram" | "parakeet" | "faster_whisper"

[providers.stt.deepgram]
# DEEPGRAM_API_KEY is the only env input; everything else lives here.
model                   = "nova-3"
language                = "en"
endpointing_ms          = 500   # silence ms before a segment finalizes
utterance_end_ms        = 1500  # speech-end grace window
smart_format            = true
punctuate               = true
keyterms                = []    # bias nova-3 toward jargon / proper nouns
replay_buffer_s         = 5.0
keepalive_interval_s    = 3.0
reconnect_max_attempts  = 5
reconnect_backoff_cap_s = 16.0
idle_close_s            = 30.0  # close per-user stream after silence; 0 disables

[providers.stt.parakeet]
# Install: ``uv sync --extra local-turn --extra local-stt-parakeet``.
model_name   = "nvidia/parakeet-tdt-0.6b-v3"
device       = "auto"           # "auto" | "cuda" | "cpu"
idle_close_s = 30.0

[providers.stt.faster_whisper]
# Install: ``uv sync --extra local-turn --extra local-stt-whisper``.
model_size   = "small"          # "tiny" | "base" | "small" | "medium" | "large-v3"
device       = "auto"           # "auto" | "cuda" | "cpu"
compute_type = "auto"           # "auto" | "int8" | "float16" | "float32"
language     = "en"
idle_close_s = 30.0

# --- Text-to-speech --------------------------------------------------------
#
# provider: "azure" (default), "cartesia", or "gemini"
#
# Azure:    set AZURE_SPEECH_KEY + AZURE_SPEECH_REGION env vars.
# Cartesia: set CARTESIA_API_KEY env var.
# Gemini:   set GOOGLE_API_KEY env var.

[tts]
provider          = "azure"
azure_voice       = "en-US-AmberNeural"
cartesia_voice_id = "999df508-4de5-40a7-8bd3-8c12f678c284"
cartesia_model    = "sonic-3"
gemini_voice      = "Kore"
gemini_model      = "gemini-3.1-flash-tts-preview"
greetings         = []

# --- Prompt shaping --------------------------------------------------------
#
# post_history_instructions: free-text block appended to the trailing
# reminder — the system message that sits *after* recent history, right
# before the model's next turn. Deepest, most recency-biased slot, so
# behavioral nudges land hardest here. Empty string omits the block.
# Override per familiar; rendered verbatim (markdown fine).
#
# image_description_constraints: appended to the neutral image-description
# base prompt (used by view_image). Per-familiar persona tuning — e.g. a
# character not set in the present bans naming modern brands, franchises,
# or celebrities so it doesn't acquire pop-culture knowledge that breaks
# immersion. Empty (default) = neutral base only.
#
# sleep_consolidation_system / sleep_stance_system / sleep_synthesis_system
# / dream_extraction_clause: STATIC instruction text for the sleep passes
# and the fact-extractor's dream-framing clause. Dynamic window data
# (facts, turns, ids, denylist) is interpolated in code; only the
# wording lives here, overridable per familiar. The validation rails
# (unknown-id, self-subject, ungrounded, cap, dedup) stay enforced in
# code regardless of this text — an override changes phrasing, never a
# safety check. Placeholders: ``_stance`` / ``_synthesis`` take
# ``{self_name}``; ``dream_extraction_clause`` takes ``{self_name}``,
# ``{self_key}``, ``{ids}``.

[prompt]
post_history_instructions = """
# Etiquette

When roleplaying, do not speak much, use <silent> generously. Don't \
interject too frequently, either. It's fine to send a message when the \
character really wants to, of course, but prefer <silent> otherwise.
"""
image_description_constraints = ""
sleep_consolidation_system = """
You are a memory-consolidation pass run while a character sleeps. You see \
the day's facts at once, so you can catch patterns a turn-by-turn \
extractor misses: near-duplicate restatements, noise minted as fact, and \
claims misfiled under the wrong person (e.g. a running joke about someone \
recorded as a fact about them).

Propose only two kinds of change:
- retire: drop a fact that is noise, a duplicate of one you keep, or a \
bit/claim asserted as fact. No replacement.
- rewrite: merge near-duplicates, or re-attribute a misfiled claim, into \
ONE consolidated fact that supersedes the listed old facts.

Discipline: never invent a claim the source facts don't support. When \
re-attributing a bit/performance to the character themselves, use the \
self subject key given below. Do NOT introduce a person not already a \
subject of the source facts. Leave a fact alone when unsure — a \
conservative empty plan is correct.

Reply with JSON only: {"retire": [{"fact_ids": [<id>...], "reason": \
"..."}], "rewrite": [{"old_fact_ids": [<id>...], "new_text": "...", \
"subject_keys": ["<key>"...], "reason": "..."}]}. Use only ids from the \
Facts list. Empty lists when nothing to do.
"""
sleep_stance_system = """
You read one day of chat and surface stance-moments for {self_name}, an \
AI character. A stance-moment is a spot where {self_name} demonstrated a \
feeling, opinion, preference, or reaction — about media, an event, a \
person, a bit, anything. Quote nothing; just name the stance and cite the \
turn ids that show it.

Ground every candidate in real turn ids from the transcript below. Only \
turns marked '(you)' are {self_name}'s — never attribute a stance to \
{self_name} from a turn they did not author, even if a user shares their \
name. Prefer turns {self_name} authored (their own words/acts). Skip \
small-talk with no stance. A thin day yields few or zero candidates — \
that is fine.
"""
sleep_synthesis_system = """
You synthesize {self_name}'s settled opinions from stance-moments \
observed across many days. Merge restatements of the same stance into \
one. Keep stances that genuinely differ (including a view {self_name} \
changed their mind on — record both, they are both true in their time). \
An opinion is {self_name}'s — phrase it about {self_name}. You may \
mention other people in passing, but the opinion is {self_name}'s stance, \
not a claim about them.

CRITICAL: every opinion's source_turn_ids MUST be drawn only from the ids \
listed on the candidates below. Invent no ids.

Rate each opinion's IMPORTANCE 1-10 by how durable/central it is to who \
{self_name} is, NOT how strongly worded:
- 7-9 = durable core stance about identity, values, or a key \
relationship (would still be true in a month).
- 4-6 = characteristic but situational (recurring tendency tied to a \
context).
- 2-3 = momentary texture, tied to one specific exchange or event.
Reserve 10 for rare bedrock identity; 1 for trivial.
"""
dream_extraction_clause = """
Dream turns (ids {ids}) are {self_name}'s own dream narration from sleep \
— fiction by definition, never real events. A fact distilled from them \
must be dream-framed ('{self_name} dreamed that …') and tagged ONLY with \
``{self_key}`` — never recorded as a real event or filed under another \
person's key.
"""

# --- LLM slots -------------------------------------------------------------
#
# Tiered by latency / quality. Pick the slot that matches each call
# site's tolerance for thinking time and tool wiring.
#
# fast       — voice replies. Reasoning off, tools off. Sub-second TTFT.
# prose      — text-channel replies. Reasoning on for craft.
# background — summaries / fact extraction / dossiers. Reasoning + tools.
#
# reasoning: "off" | "low" | "medium" | "high" | omit (model default).
#   GLM 5.2 reasons by default — set "off" to suppress; Haiku 4.5
#   never reasons regardless. OpenRouter maps to its `reasoning`
#   parameter (effort levels, or `exclude=true` for "off").
#
# tool_calling: bool — enables alarm/cancel tools + agentic loop.
# image_tools: bool — enables view_image in text registry (never voice).
# multimodal: bool — send JPEG content blocks instead of text descriptions
#   for ImageResult; only set for vision-capable model slots.
#
# image_description_model: shared key at [llm] level (not per slot).
#   Model used to generate text descriptions of images. Empty = disabled.
#   Example: image_description_model = "openai/gpt-4o"
#
# max_concurrent_requests: shared key at [llm] level. Process-wide cap
#   on in-flight LLM requests across every slot — the bottleneck is the
#   OpenRouter key's rate limit, not any single call site.
#
# provider_order pins OpenRouter routing for prompt-cache stability.
# STOPGAP — drop once OpenRouter's default routing reliably hits a
# cache-supporting provider. See docs/architecture/tuning.md
# § provider pinning.

[llm]
max_concurrent_requests = 4

[llm.fast]
model        = "anthropic/claude-haiku-4.5"
temperature  = 0.7
reasoning    = "off"
tool_calling = false
# image_tools = false  # view_image excluded from voice; keep false here
# multimodal = false

[llm.prose]
model          = "z-ai/glm-5.2"
temperature    = 0.7
provider_order = ["z-ai"]            # first-party — best caching for GLM
reasoning      = "medium"
tool_calling   = false
# image_tools = false  # set true + configure image_description_model to enable
# multimodal = false   # set true when prose model supports vision

[llm.background]
model          = "z-ai/glm-5.2"
temperature    = 0.7
provider_order = ["z-ai"]
reasoning      = "medium"
tool_calling   = true

# --- Discord text-channel behavior ----------------------------------------
#
# respond_to_typing: when other users start typing in a subscribed
# channel, treat that as an interruption — cancel any in-flight LLM
# stream so the bot doesn't talk over them. Default true.
# typing_backoff_initial_s / typing_backoff_max_s: when *another bot*
# (e.g. another familiar-connect instance) is typing in the same
# channel, hold off responding by an exponentially doubling window —
# initial doubles up to max — so two bots don't pingpong on each
# other's typing indicators.

[discord]
# dm_allowlist = [123456789012345678]  # user IDs whose DMs the familiar will engage

[discord.text]
respond_to_typing        = true
typing_backoff_initial_s = 1.0
typing_backoff_max_s     = 30.0

# --- Attentional focus -------------------------------------------------------
#
# unread_nudge_enabled: when true, an unfocused-channel arrival nudges
# the model so unreads surface promptly (the nudge never moves focus —
# only the model's shift_focus tool does); false disables it.
# nudge_debounce_seconds: rapid arrivals within this window share one
# nudge.

[focus]
unread_nudge_enabled   = true
nudge_debounce_seconds = 30.0

# --- Tools -------------------------------------------------------------------
#
# loop_max_iterations: hard cap on agentic-loop rounds per turn
# (model call → tool execution → re-call). Protects against runaway
# tool loops; raise for deeper multi-tool tasks at the cost of
# latency + spend.

[tools]
loop_max_iterations = 5
