# Default familiar profile — checked into the repo.
#
# This file is the single source of truth for configuration defaults.
# When another familiar's `character.toml` omits a field (or a whole
# [llm.*] or [tts] section), the loader falls back to the value here.
#
# New familiars should copy this file as a starting template:
#
#     cp -r data/familiars/_default data/familiars/my-familiar
#     # then edit data/familiars/my-familiar/character.toml
#
# The leading underscore in the folder name is a convention: it marks
# the directory as a reference, not a runnable familiar. Do not set
# FAMILIAR_ID=_default.

# --- Persona and behaviour -------------------------------------------------

default_mode  = "text_conversation_rp"
display_tz    = "UTC"
aliases       = []
chattiness    = "Balanced — responds when the conversation is relevant"
interjection  = "average"
text_lull_timeout  = 10.0
voice_lull_timeout = 5.0

# --- Voice interruption handling (voice channels only) --------------------
#
# When the familiar is speaking or generating and a user starts talking,
# the interruption detector classifies by duration and dispatches to the
# appropriate handler. `interrupt_tolerance` controls the probability of
# pushing through a short interruption mid-speech (higher = more
# stubborn). See docs/roadmap/interruption-flow.md.

[voice.interruption]
interrupt_tolerance   = "average"   # very_meek | meek | average | stubborn | very_stubborn
min_interruption_s    = 2.0         # back-channel filter threshold
short_long_boundary_s = 30.0        # short (polite pause) vs. long (regen)

# --- Typing simulation (text channels only) -------------------------------
#
# Chunks the LLM reply into paragraphs and sends each after a length-
# proportional "typing..." delay. A new user message mid-delivery cancels
# the remaining chunks; already-sent chunks become the assistant turn.
#
# Per-mode defaults live in channel_config_for_mode() — text_conversation_rp
# enables; full_rp and imitate_voice disable. Uncomment below to override
# familiar-wide (or per-channel via channels/<id>.toml).
# See docs/architecture/typing-simulation.md.
#
# [typing_simulation]
# enabled                  = true
# chars_per_second         = 40.0    # ~240 wpm
# min_delay_s              = 0.8
# max_delay_s              = 6.0
# inter_line_pause_s       = 0.7
# sentence_split_threshold = 400     # chars — paragraphs above split by sentence

[providers.history]
window_size = 20

# --- Memory writer (post-session summarisation into long-term memory) ---------

[memory_writer]
turn_threshold = 50     # run writer after this many new turns
idle_timeout   = 1800.0 # run writer after 30 min of silence

[layers.depth_inject]
position = 0
role     = "system"

# --- Text-to-speech --------------------------------------------------------
#
# provider: "azure" (default) or "cartesia"
#
# Azure:    set AZURE_SPEECH_KEY + AZURE_SPEECH_REGION env vars.
#           azure_voice is any Azure Neural voice name.
#
# Cartesia: set CARTESIA_API_KEY env var.
#           voice_id is the Cartesia voice UUID; model is e.g. "sonic-3".

[tts]
provider    = "azure"
azure_voice = "en-US-AmberNeural"
voice_id    = "999df508-4de5-40a7-8bd3-8c12f678c284"
model       = "sonic-3"
# Spoken on voice-channel join; one picked at random. Empty → "Hello!".
# Each distinct line is synthesised once and cached in-process.
# greetings = ["Hello!", "Hey there!", "Mornin'!"]

# --- LLM slots -------------------------------------------------------------
#
# Every LLM call site in the codebase has its own slot here. Each slot
# carries its own model and temperature so a familiar can trade off cost,
# latency, and quality per call site independently.
#
# Unset slots in a familiar's own character.toml inherit from this file.

# Main reply path: the familiar's spoken reply to a Discord message.
[llm.main_prose]
model       = "z-ai/glm-5.1"
temperature = 0.7

# Recast post-processor: rewrite the reply for tone or spoken delivery.
[llm.post_process_style]
model       = "mistralai/mistral-small-2603"
temperature = 0.5

# Stepped-thinking pre-processor: hidden chain-of-thought before replying.
[llm.reasoning_context]
model       = "mistralai/mistral-small-2603"
temperature = 0.3

# History provider: summarise own-channel and cross-channel history.
[llm.history_summary]
model       = "mistralai/mistral-small-2603"
temperature = 0.4

# Content-search provider: agentic memory / lore retrieval loop.
[llm.memory_search]
model       = "mistralai/mistral-small-2603"
temperature = 0.4

# Memory writer: post-session summarisation into long-term memory files.
[llm.memory_writer]
model       = "mistralai/mistral-small-2603"
temperature = 0.3

# Chattiness monitor: decide whether to proactively join a conversation.
[llm.interjection_decision]
model       = "mistralai/mistral-small-2603"
temperature = 0.5

# Mood evaluator: classify emotional context of recent turns → interrupt bias.
[llm.mood_eval]
model       = "mistralai/mistral-small-2603"
temperature = 0.3
